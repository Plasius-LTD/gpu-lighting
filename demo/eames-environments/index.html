<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <title>Eames Environment Lighting Validation</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #070a0d;
        color: #edf4f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-block-size: 100vh;
        overflow: hidden;
        background: #070a0d;
      }

      main {
        position: relative;
        inline-size: 100vw;
        block-size: 100vh;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.045), transparent 36%),
          #070a0d;
      }

      canvas {
        display: block;
        inline-size: 100%;
        block-size: 100%;
      }

      .hud {
        position: absolute;
        inset-block-start: 14px;
        inset-inline-start: 14px;
        display: grid;
        gap: 4px;
        max-inline-size: min(520px, calc(100vw - 28px));
        padding: 10px 12px;
        border: 1px solid rgba(235, 246, 255, 0.2);
        background: rgba(5, 8, 12, 0.76);
        color: #f4fbff;
        font-size: 12px;
        line-height: 1.35;
        pointer-events: none;
      }

      .hud strong {
        font-size: 13px;
        font-weight: 700;
      }

      .hud span {
        color: rgba(237, 246, 252, 0.82);
      }

      .error {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        color: #ffebe9;
        background: #1a0508;
        font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="stage" aria-label="Eames chair environment lighting validation"></canvas>
      <div class="hud" id="hud">
        <strong>Preparing Eames environment render</strong>
        <span>Waiting for WebGPU.</span>
      </div>
    </main>
    <script type="module" src="./page.js"></script>
  </body>
</html>
